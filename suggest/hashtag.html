<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Hashtag 自動完成測試</title>
<script src="https://unpkg.com/vue@2"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>
    <div id="app" class="container">
        <br>
        <div class="row">
            <div class="col-sm-12">
                <input v-model="keyword" @input="change" class="form-control" placeholder="請輸入關鍵字">
            </div>
            <div v-loading="loading" class="col-sm-12">
                <div v-for="hashtag in hashtags">
                    {{ hashtag.name }}
                </div>
            </div>
        </div>
    </div>

    <script>
    var app = new Vue({
        el: '#app',
        data: {
            loading: false,
            keyword: '',
            hashtags: [],
        },
        methods: {
            change(event) {
                var that = this;
                if ('' == this.keyword) {
                    that.hashtags = [];
                    return;
                }
                that.loading = true;
                axios.get('https://app.mooder.work/api/v1/suggest/hashtags?keyword=' + this.keyword)
                    .then(function (response) {
                        that.loading = false;
                        that.hashtags = response.data.hashtags;
                    });
            }
        }
    });
    </script>
</body>
</html>
